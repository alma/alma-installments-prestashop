services:
  alma.controller.settings:
    public: true
    class: 'PrestaShop\Module\Alma\Controller\SettingsController'
    parent: 'PrestaShopBundle\Controller\Admin\FrameworkBundleAdminController'
  #####################
  # PS Account
  alma.ps_accounts_installer:
    public: true
    class: 'PrestaShop\PsAccountsInstaller\Installer\Installer'
    arguments:
      - '5.0'

  alma.ps_accounts_facade:
    public: true
    class: 'PrestaShop\PsAccountsInstaller\Installer\Facade\PsAccounts'
    arguments:
      - '@alma.ps_accounts_installer'
