services:
  _defaults:
    public: true

  ##############
  # Alma
  PrestaShop\Module\Alma\Infrastructure\Controller\SettingsController:
    class: PrestaShop\Module\Alma\Infrastructure\Controller\SettingsController
    arguments:
      - '@alma.ps_accounts_service'
    tags:
      - 'controller.service_arguments'

  alma.module:
    class: Alma
    factory: [ 'Module', 'getInstanceByName' ]
    arguments:
      - 'alma'

  alma.context:
    class: Context
    factory: [ 'Context', 'getContext' ]

  alma.language_repository:
    class: 'PrestaShop\Module\Alma\Infrastructure\Repository\LanguageRepository'

  alma.ps_accounts_service:
    class: 'PrestaShop\Module\Alma\Application\Service\PsAccountsService'
    arguments:
      - '@alma.module_service'

  alma.module_service:
    class: 'PrestaShop\Module\Alma\Application\Service\ModuleService'
    arguments:
      - '@alma.module'
      - '@alma.language_repository'

  #####################
  # PrestaShop Account
  alma.ps_accounts_installer:
    class: 'PrestaShop\PsAccountsInstaller\Installer\Installer'
    arguments:
      - '5.0'

  alma.ps_accounts_facade:
    class: 'PrestaShop\PsAccountsInstaller\Installer\Facade\PsAccounts'
    arguments:
      - '@alma.ps_accounts_installer'
